/**:
  ros__parameters:
    # Frames
    base_frame: base_link
    odom_frame: odom

    # Inputs
    imu_topic: /imu
    # Wheel speed input (geometry_msgs/TwistStamped).
    # When wheel_speed.use=true, wheel speed is used only as a degeneracy-aware assist
    # for LiDAR scan matching and as a fallback speed source when LiDAR is unavailable.
    wheel_speed_topic: /vehicle/twist
    # Optional reference pose (PoseWithCovarianceStamped) for wheel speed scale estimation (e.g. /localization/ndt_pose)
    reference_pose_topic: ""
    # LiDAR points for scan-to-scan odometry (undistorted point cloud is recommended)
    points_topic: /localization/points_undistorted

    # Outputs
    out_twist_topic: /localization/twist
    out_odom_topic: /localization/gyro_lidar_odom
    out_stopped_topic: /localization/is_stopped
    # IMU corrected into base_frame (TF-applied + yaw gyro bias corrected)
    out_imu_topic: /localization/imu_corrected

    imu_corrected.enable: true
    imu_corrected.apply_tf: true
    # If true, attempts to transform orientation into base_frame as well.
    # Many pipelines do not use IMU orientation for 2D localization; keep false unless you need it.
    imu_corrected.transform_orientation: false

    publish_rate_hz: 50.0

    # Stop detection
    stop.enable: true
    stop.speed_thr_mps: 0.15
    stop.gyro_abs_thr_rad_s: 0.05
    stop.acc_var_thr: 0.0225
    stop.hold_sec: 0.5

    # Gyro bias estimation (only updated while stopped)
    gyro_bias.enable: true
    gyro_bias.tau_sec: 10.0
    gyro_bias.max_abs_rad_s: 0.5
    gyro_bias.initial_bg_rad_s: 0.0

    # Wheel speed assist
    wheel_speed.use: true
    wheel_speed.scale_factor: 1.0
    wheel_speed.timeout_sec: 0.2

    wheel_speed.low_speed.enable: true
    wheel_speed.low_speed.deadband_mps: 0.12
    wheel_speed.low_speed.acc_thr_mps2: 0.2
    wheel_speed.low_speed.blend: 0.5
    wheel_speed.low_speed.max_corr_mps: 0.3

    # Optional: online scale estimation (disabled by default)
    wheel_speed.scale_estimation.enable: false
    wheel_speed.scale_estimation.tau_sec: 30.0
    wheel_speed.scale_estimation.min_ref_dist_m: 2.0
    wheel_speed.scale_estimation.min_wheel_dist_m: 1.0
    wheel_speed.scale_estimation.min_scale: 0.5
    wheel_speed.scale_estimation.max_scale: 2.0

    # Hessian-based degeneracy detection and wheel+IMU arc-motion assist.
    # The weak directions are detected from small_gicp final Hessian, then only those
    # directions are nudged toward the wheel+IMU arc-motion prior.
    wheel_speed.degeneracy.enable: true
    # Yaw unit normalization for Hessian eigen-analysis [m/rad].
    wheel_speed.degeneracy.yaw_metric_m: 2.0
    # Weak direction if lambda_i / lambda_max is smaller than this threshold.
    wheel_speed.degeneracy.rel_eigenvalue_thr: 0.10
    # Optional absolute threshold on normalized eigenvalues (0.0 disables it).
    wheel_speed.degeneracy.abs_eigenvalue_thr: 0.0
    # Require at least this wheel travel over a LiDAR interval before enabling assist.
    wheel_speed.degeneracy.min_wheel_dist_m: 0.05
    # Global scale for the weak-direction correction toward the wheel+IMU prior.
    wheel_speed.degeneracy.prior_blend: 1.0
    # Optional std_msgs/String publisher for per-scan degeneracy debug output.
    wheel_speed.degeneracy.debug_pub.enable: true
    wheel_speed.degeneracy.debug_pub.topic: /localization/lidar_degeneracy_debug

    # LiDAR odometry (small_gicp / GICP-OMP).
    lidar_odom.enable: true
    lidar_odom.backend: SMALL_GICP
    lidar_odom.registration_type: VGICP
    lidar_odom.num_threads: 8
    lidar_odom.timeout_sec: 0.5
    lidar_odom.min_range_m: 2.0
    lidar_odom.max_range_m: 80.0
    lidar_odom.voxel_leaf_m: 0.25

    lidar_odom.gicp.max_corr_dist_m: 1.8
    lidar_odom.gicp.max_iterations: 50
    lidar_odom.gicp.trans_eps: 1.0e-3
    lidar_odom.gicp.rot_eps: 2.0e-3
    lidar_odom.gicp.corr_randomness: 20
    lidar_odom.gicp.max_fitness: 5.0
    lidar_odom.gicp.voxel_resolution: 0.8

    lidar_odom.pose_se2.enable: true
    lidar_odom.pose_se2.yaw_blend_imu: 0.0
    # Normally use IMU yaw-only guess. When the previous LiDAR interval was judged degenerate,
    # the node temporarily keeps the full corrected guess for the next ICP.
    lidar_odom.pose_se2.guess_use_imu_yaw_only: true

    lidar_odom.smoother.enable: true
    lidar_odom.smoother.window_size: 25
    lidar_odom.smoother.w_imu: 10.0
    lidar_odom.smoother.w_scan: 1.5
    lidar_odom.smoother.lambda: 0.2
    lidar_odom.smoother.fitness_sigma: 0.5
    lidar_odom.smoother.min_scan_weight: 0.1
    lidar_odom.smoother.max_scan_weight: 2.0

    # Optional zero-velocity update (ZUPT) factor in the mini smoother.
    # Applies only when stop detection is active and the interval is classified as stationary.
    lidar_odom.smoother.zupt.enable: true
    lidar_odom.smoother.zupt.w_trans: 25.0
    lidar_odom.smoother.zupt.w_yaw: 25.0

    # Optional midpoint non-holonomic constraint (NHC).
    # Constrains lateral motion in the body frame at the interval midpoint orientation.
    lidar_odom.smoother.nhc.enable: true
    lidar_odom.smoother.nhc.w_lateral: 2.0
    lidar_odom.smoother.nhc.huber_delta_m: 0.10
